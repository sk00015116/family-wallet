<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>家族用スターライトマネー管理</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>家族用スターライトマネー管理</h1>

  <button id="showAddForm">新しい家族を追加</button>

  <div id="addForm" style="display:none;">
    <label>名前: <input type="text" id="name"></label>
    <label>電話番号: <input type="text" id="phone"></label>
    <label>残高: <input type="number" id="balance"></label>
    <button id="addBtn">追加</button>
  </div>

  <table id="userTable">
    <thead>
      <tr>
        <th>名前</th>
        <th>電話番号</th>
        <th>残高</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script src="script.js"></script>
</body>
</html>
